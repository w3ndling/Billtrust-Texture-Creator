<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTAGLIO — Billtrust Texture Engine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg:#0E120E;
    --panel:#131813;
    --line:rgba(236,230,214,.12);
    --txt:#ECE6D6;
    --txt-dim:rgba(236,230,214,.55);
    --mono:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --serif:Georgia, 'Times New Roman', serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--txt);
    font-family:var(--mono);
    font-size:12px;
    display:grid;
    grid-template-columns:300px 1fr;
    height:100vh;
    overflow:hidden;
  }
  /* ---------- sidebar ---------- */
  aside{
    background:var(--panel);
    border-right:1px solid var(--line);
    overflow-y:auto;
    padding:0 0 32px;
  }
  header{ padding:26px 22px 20px; border-bottom:1px solid var(--line); }
  h1{
    font-family:var(--serif); font-weight:400; font-size:21px;
    letter-spacing:.34em; margin-right:-.34em;
  }
  header p{
    margin-top:7px; color:var(--txt-dim); font-size:10px;
    letter-spacing:.18em; text-transform:uppercase;
  }
  .tabs{ display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid var(--line); }
  .tabs button{
    all:unset; cursor:pointer; text-align:center; padding:12px 0;
    font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--txt-dim); border-bottom:2px solid transparent;
  }
  .tabs button[aria-selected="true"]{ color:var(--txt); border-bottom-color:var(--txt); }
  .tabs button:focus-visible{ outline:1px solid var(--txt); outline-offset:-4px; }

  section.pane{ display:none; }
  section.pane.on{ display:block; }

  .group{ padding:18px 22px 4px; }
  .group + .group{ border-top:1px solid var(--line); margin-top:14px; }
  .label{
    font-size:10px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--txt-dim); margin-bottom:12px;
  }

  .modes{ display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:14px;}
  .modes button{
    all:unset; cursor:pointer; text-align:center; padding:9px 0;
    font-family:var(--mono); font-size:11px; letter-spacing:.08em;
    border:1px solid var(--line); color:var(--txt-dim);
  }
  .modes button[aria-pressed="true"]{ background:var(--txt); color:var(--bg); border-color:var(--txt); }
  .modes button:focus-visible{ outline:1px solid var(--txt); outline-offset:2px; }

  .ctl{ margin-bottom:13px; }
  .ctl .row{ display:flex; justify-content:space-between; margin-bottom:5px; }
  .ctl .row span:last-child{ color:var(--txt-dim); }
  input[type=range]{
    -webkit-appearance:none; appearance:none; width:100%; height:16px;
    background:transparent; cursor:pointer;
  }
  input[type=range]::-webkit-slider-runnable-track{ height:1px; background:var(--line); }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:11px; height:11px; margin-top:-5px;
    background:var(--txt); border-radius:50%;
  }
  input[type=range]::-moz-range-track{ height:1px; background:var(--line); }
  input[type=range]::-moz-range-thumb{ width:11px; height:11px; background:var(--txt); border:none; border-radius:50%; }
  input[type=range]:focus-visible{ outline:1px solid var(--txt); outline-offset:4px; }

  .chips{ display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;}
  .chip{
    all:unset; cursor:pointer; width:34px; height:24px;
    border:1px solid var(--line); position:relative; overflow:hidden;
  }
  .chip i{ position:absolute; inset:0; }
  .chip i:last-child{ clip-path:polygon(100% 0,100% 100%,0 100%); }
  .chip[aria-pressed="true"]{ outline:1px solid var(--txt); outline-offset:2px; }
  .chip:focus-visible{ outline:1px solid var(--txt); outline-offset:2px; }
  .pickers{ display:flex; gap:14px; align-items:center; margin-bottom:6px;}
  .pickers label{ display:flex; align-items:center; gap:7px; color:var(--txt-dim); font-size:11px;}
  input[type=color]{
    -webkit-appearance:none; appearance:none; width:26px; height:20px;
    border:1px solid var(--line); background:none; padding:0; cursor:pointer;
  }
  input[type=color]::-webkit-color-swatch-wrapper{ padding:0; }
  input[type=color]::-webkit-color-swatch{ border:none; }

  .ratios{ display:flex; gap:6px; margin-bottom:6px; flex-wrap:wrap;}
  .ratios button{
    all:unset; cursor:pointer; padding:7px 10px; font-family:var(--mono);
    font-size:11px; border:1px solid var(--line); color:var(--txt-dim);
  }
  .ratios button[aria-pressed="true"]{ background:var(--txt); color:var(--bg); border-color:var(--txt);}
  .ratios button:focus-visible{ outline:1px solid var(--txt); outline-offset:2px; }

  .actions{ padding:20px 22px 0; display:grid; gap:8px;}
  .duo{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .btn{
    all:unset; cursor:pointer; text-align:center; padding:11px 4px;
    font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
    border:1px solid var(--txt); color:var(--txt);
  }
  .btn.primary{ background:var(--txt); color:var(--bg); }
  .btn[disabled]{ opacity:.35; pointer-events:none; }
  .btn:focus-visible{ outline:1px solid var(--txt); outline-offset:3px; }
  .seed{ text-align:center; color:var(--txt-dim); font-size:10px; letter-spacing:.14em; padding-top:10px;}

  .drop{
    border:1px dashed var(--line); padding:26px 12px; text-align:center;
    color:var(--txt-dim); cursor:pointer; margin-bottom:16px; line-height:1.7;
  }
  .drop.hot{ border-color:var(--txt); color:var(--txt); }
  .drop input{ display:none; }
  .drop b{ color:var(--txt); font-weight:400; text-decoration:underline; text-underline-offset:3px;}

  /* ---------- stage ---------- */
  main{
    display:flex; align-items:center; justify-content:center;
    padding:36px; overflow:hidden; position:relative;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(236,230,214,.045), transparent 65%),
      var(--bg);
  }
  #cv{
    max-width:100%; max-height:100%;
    box-shadow:0 30px 80px rgba(0,0,0,.55), 0 4px 18px rgba(0,0,0,.4);
  }
  .hint{
    position:absolute; bottom:16px; left:0; right:0; text-align:center;
    color:var(--txt-dim); font-size:10px; letter-spacing:.18em; text-transform:uppercase;
  }

  @media (max-width:820px){
    body{ grid-template-columns:1fr; grid-template-rows:auto 1fr; height:auto; overflow:auto;}
    aside{ border-right:none; border-bottom:1px solid var(--line);}
    main{ min-height:70vh; }
  }
</style>
</head>
<body>

<aside>
  <header>
    <h1>INTAGLIO</h1>
    <p>Billtrust texture engine</p>
  </header>

  <div class="tabs" role="tablist">
    <button id="tabTexture" role="tab" aria-selected="true">Texture</button>
    <button id="tabImage" role="tab" aria-selected="false">Image</button>
  </div>

  <!-- TEXTURE PANE -->
  <section class="pane on" id="paneTexture">
    <div class="group">
      <div class="label">Plate</div>
      <div class="modes" id="modes">
        <button data-mode="flow" aria-pressed="true">Flow</button>
        <button data-mode="waves" aria-pressed="false">Waves</button>
        <button data-mode="cross" aria-pressed="false">Cross</button>
        <button data-mode="guilloche" aria-pressed="false">Guilloche</button>
      </div>
      <div id="texSliders"></div>
    </div>
  </section>

  <!-- IMAGE PANE -->
  <section class="pane" id="paneImage">
    <div class="group">
      <div class="label">Source</div>
      <label class="drop" id="drop">
        <span id="dropMsg">Drop, paste (Ctrl/Cmd+V),<br>or <b>browse</b> for an image</span>
        <input type="file" id="file" accept="image/*">
      </label>
      <div id="imgSliders"></div>
    </div>
  </section>

  <!-- SHARED -->
  <div class="group">
    <div class="label">Ink &amp; paper</div>
    <div class="chips" id="chips"></div>
    <div class="pickers">
      <label>Paper <input type="color" id="paperPick" value="#F2EDE0"></label>
      <label>Ink <input type="color" id="inkPick" value="#211E15"></label>
    </div>
  </div>

  <div class="group" id="ratioGroup">
    <div class="label">Frame</div>
    <div class="ratios" id="ratios">
      <button data-r="16:9" aria-pressed="true">16:9</button>
      <button data-r="1:1" aria-pressed="false">1:1</button>
      <button data-r="4:5" aria-pressed="false">4:5</button>
      <button data-r="9:16" aria-pressed="false">9:16</button>
    </div>
  </div>

  <div class="group">
    <div class="label">Motion</div>
    <div class="ctl">
      <div class="row"><span>Drift</span><span id="v_m_drift">40</span></div>
      <input type="range" min="0" max="100" value="40" id="s_m_drift" aria-label="Drift">
    </div>
    <div class="label" style="margin-top:14px">Loop length</div>
    <div class="ratios" id="durs">
      <button data-d="4" aria-pressed="false">4s</button>
      <button data-d="6" aria-pressed="true">6s</button>
      <button data-d="8" aria-pressed="false">8s</button>
      <button data-d="10" aria-pressed="false">10s</button>
    </div>
    <div style="height:12px"></div>
    <button class="btn" id="motionToggle" style="display:block">Set plate in motion</button>
  </div>

  <div class="actions">
    <button class="btn" id="rand">Re-strike plate</button>
    <div class="duo">
      <button class="btn primary" id="exportPng">PNG · 2×</button>
      <button class="btn primary" id="exportSvg">SVG</button>
    </div>
    <div class="duo">
      <button class="btn" id="exportMp4">Loop · MP4</button>
      <button class="btn" id="exportMov">Loop · MOV</button>
    </div>
    <button class="btn" id="exportZip">Frames · ZIP</button>
    <div class="seed" id="seedLbl"></div>
  </div>
</aside>

<main>
  <canvas id="cv"></canvas>
  <div class="hint" id="hint">Adjust the plate — the print updates live</div>
</main>

<script>
/* ============================================================
   INTAGLIO v2 — engraving texture engine
   Stills (PNG / SVG) + seamless loops (MOV / PNG sequence)
   ============================================================ */

const $ = s => document.querySelector(s);
const lerp = (a,b,t) => a + (b-a)*t;
const clamp = (v,a,b) => Math.max(a, Math.min(b,v));
const TAU = Math.PI * 2;
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ---------- deterministic randomness ---------- */
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
/* position-based hash: identical every frame — no flicker in motion */
function white(x, y, s = 0){
  const n = Math.sin(x*127.1 + y*311.7 + s*74.7 + state.seed*0.013) * 43758.5453;
  return n - Math.floor(n);
}
function makeNoise(seed){
  const rnd = mulberry32(seed);
  const perm = new Uint8Array(512);
  const p = Array.from({length:256},(_,i)=>i);
  for(let i=255;i>0;i--){ const j = Math.floor(rnd()*(i+1)); [p[i],p[j]]=[p[j],p[i]]; }
  for(let i=0;i<512;i++) perm[i] = p[i & 255];
  const h = (x,y) => perm[(perm[x & 255] + y) & 255] / 255;
  const sm = t => t*t*(3-2*t);
  function n2(x,y){
    const ix=Math.floor(x), iy=Math.floor(y), fx=x-ix, fy=y-iy;
    const a=h(ix,iy), b=h(ix+1,iy), c=h(ix,iy+1), d=h(ix+1,iy+1);
    const u=sm(fx), v=sm(fy);
    return a + (b-a)*u + (c-a)*v + (a-b-c+d)*u*v;
  }
  function fbm(x,y,o=4){
    let s=0, amp=.5, f=1, norm=0;
    for(let i=0;i<o;i++){ s += amp*n2(x*f, y*f); norm += amp; f*=2; amp*=.5; }
    return s / norm;
  }
  return { n2, fbm };
}

/* ---------- state ---------- */
const state = {
  tab:'texture',
  mode:'flow',
  seed: Math.floor(Math.random()*99999),
  ratio:'16:9',
  paper:'#F2EDE0',
  ink:'#211E15',
  dur: 6,
  t:{ scale:.45, density:.55, weight:.4, breakup:.5, calm:.35, wave:.5 },
  i:{ spacing:.45, amp:.4, freq:.5, weight:.5, cutoff:.35, cross:.4 },
  m:{ drift:.4 },
  image:null
};
const RATIOS = { '16:9':[1680,945], '1:1':[1240,1240], '4:5':[1150,1438], '9:16':[945,1680] };

/* ---------- draw surfaces (canvas or SVG recorder) ---------- */
function canvasSurface(g){
  g.lineCap = 'round'; g.lineJoin = 'round';
  g.strokeStyle = state.ink;
  return {
    seg(x1,y1,x2,y2,w,a){
      g.beginPath(); g.lineWidth = w; g.globalAlpha = a;
      g.moveTo(x1,y1); g.lineTo(x2,y2); g.stroke(); g.globalAlpha = 1;
    },
    poly(pts,w,a){
      if(pts.length < 2) return;
      g.beginPath(); g.lineWidth = w; g.globalAlpha = a;
      g.moveTo(pts[0][0], pts[0][1]);
      for(let i=1;i<pts.length;i++) g.lineTo(pts[i][0], pts[i][1]);
      g.stroke(); g.globalAlpha = 1;
    }
  };
}
function svgSurface(){
  const groups = new Map();
  const fmt = v => Math.round(v*10)/10;
  const bucket = (w,a) => (Math.round(w*10)/10) + '|' + (Math.round(a*20)/20);
  const push = (k,d) => { if(!groups.has(k)) groups.set(k,[]); groups.get(k).push(d); };
  return {
    seg(x1,y1,x2,y2,w,a){
      push(bucket(w,a), `M${fmt(x1)} ${fmt(y1)}L${fmt(x2)} ${fmt(y2)}`);
    },
    poly(pts,w,a){
      if(pts.length < 2) return;
      let d = `M${fmt(pts[0][0])} ${fmt(pts[0][1])}`;
      for(let i=1;i<pts.length;i++) d += `L${fmt(pts[i][0])} ${fmt(pts[i][1])}`;
      push(bucket(w,a), d);
    },
    out(W,H){
      let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">`;
      s += `<rect width="${W}" height="${H}" fill="${state.paper}"/>`;
      for(const [k, arr] of groups){
        const [w,a] = k.split('|');
        s += `<path d="${arr.join('')}" fill="none" stroke="${state.ink}" stroke-width="${w}" stroke-opacity="${a}" stroke-linecap="round" stroke-linejoin="round"/>`;
      }
      return s + '</svg>';
    }
  };
}

/* ---------- renderers ----------
   All take normalized loop time t in [0,1).
   Motion = circular path through noise space, so t=0 and t=1 match exactly. */
function driftOffsets(t){
  const R = lerp(0.25, 1.8, state.m.drift);
  return [ Math.cos(TAU*t)*R, Math.sin(TAU*t)*R ];
}

/* --- FLOW: dashed hatching following a swimming noise field --- */
function renderFlow(srf, W, H, N, S, t, angleOffset=0, gateInvert=false, wMul=1){
  const T = state.t;
  const [ox, oy] = driftOffsets(t);
  const step   = lerp(20, 7, T.density) * S;
  const fs     = lerp(0.0016, 0.0075, T.scale) / S;
  const macro  = 0.0011 / S;
  const baseW  = lerp(0.7, 2.6, T.weight) * S * wMul;
  const dashL  = step * lerp(2.6, 1.4, T.breakup);
  let cy = 0;
  for(let y = -step; y < H + step; y += step, cy++){
    let cx = 0;
    for(let x = -step; x < W + step; x += step, cx++){
      const jx = x + (white(cx,cy,1)-.5)*step, jy = y + (white(cx,cy,2)-.5)*step;
      let m = N.fbm(jx*macro + 41.7 + ox*0.35, jy*macro + 17.3 + oy*0.35, 3);
      if(gateInvert) m = 1 - m;
      const gate = (m - lerp(0, .62, T.calm)) / .18;
      if(gate < white(cx,cy,3)) continue;
      const a = N.fbm(jx*fs + ox, jy*fs + oy, 4) * Math.PI * 2.6 + angleOffset;
      const dx = Math.cos(a), dy = Math.sin(a);
      const tone = N.fbm(jx*fs*1.7 + 99 + ox, jy*fs*1.7 + 99 + oy, 3);
      const w = baseW * (0.65 + tone*0.9);
      const parts = 1 + Math.floor(white(cx,cy,4) * lerp(1, 3, T.breakup));
      let u = -dashL/2;
      for(let p=0; p<parts; p++){
        const len = (dashL/parts) * (0.55 + white(cx,cy,5+p)*0.45);
        srf.seg(jx + dx*u, jy + dy*u, jx + dx*(u+len), jy + dy*(u+len),
                w, 0.82 + white(cx,cy,9+p)*0.18);
        u += (dashL/parts);
      }
    }
  }
}

/* --- WAVES: undulating contour rows, tonal weight --- */
function renderWaves(srf, W, H, N, S, t){
  const T = state.t;
  const [ox, oy] = driftOffsets(t);
  const rowStep = lerp(15, 4.5, T.density) * S;
  const amp     = lerp(6, 55, T.wave) * S;
  const ws      = lerp(0.0012, 0.005, T.scale) / S;
  const baseW   = lerp(0.6, 2.4, T.weight) * S;
  const px      = 3 * S;
  let row = 0;
  for(let y = -amp; y < H + amp; y += rowStep, row++){
    let penDown = false, lx = 0, ly = 0;
    for(let x = 0; x <= W; x += px){
      const yy = y + (N.fbm(x*ws + ox, y*ws*1.4 + oy, 4) - .5) * 2 * amp;
      const tone = N.fbm(x*ws*1.6 + 300 + ox, y*ws*1.6 + 300 + oy, 3);
      const calmGate = N.fbm(x*0.0011/S + 80 + ox*0.35, y*0.0011/S + 80 + oy*0.35, 3) > lerp(0, .6, T.calm);
      const breakGate = N.n2(x*0.05/S + row*13.7, row*3.1) > lerp(0, .45, T.breakup);
      const on = calmGate && breakGate;
      if(on && penDown){
        srf.seg(lx, ly, x, yy, baseW * (0.55 + tone*1.1), 0.85 + tone*0.15);
      }
      penDown = on; lx = x; ly = yy;
    }
  }
}

/* --- CROSS: two flow passes, second gated to darker pockets --- */
function renderCross(srf, W, H, N, S, t){
  renderFlow(srf, W, H, N, S, t, 0, false, 1);
  const N2 = makeNoise(state.seed + 7919);
  renderFlow(srf, W, H, N2, S, t, Math.PI/2.7, true, 0.8);
}

/* --- GUILLOCHE: woven sine lattice (integer cycles = perfect loop) --- */
function renderGuilloche(srf, W, H, N, S, t){
  const T = state.t;
  const [ox, oy] = driftOffsets(t);
  const lines = Math.floor(lerp(28, 90, T.density));
  const A     = lerp(10, 90, T.wave) * S;
  const f1    = lerp(0.004, 0.014, T.scale) / S;
  const f2    = f1 * 0.37;
  const w     = lerp(0.5, 1.8, T.weight) * S;
  const px    = 3 * S;
  for(let i=0; i<lines; i++){
    const phase = (i/lines) * TAU;
    const yc = (i/(lines-1)) * (H + A*2) - A;
    let pts = [];
    for(let x=0; x<=W; x+=px){
      const y = yc
        + A * Math.sin(x*f1 + phase*3 + TAU*t)
        + A * .6 * Math.sin(x*f2 - phase*5 - TAU*t)
        + (N.fbm(x*0.001/S + ox*0.4, i*0.15 + oy*0.4, 2) - .5) * A * T.breakup;
      const calmGate = N.fbm(x*0.0011/S + 80 + ox*0.35, y*0.0011/S + 80 + oy*0.35, 3) > lerp(0, .55, T.calm);
      if(calmGate){ pts.push([x,y]); }
      else if(pts.length){ srf.poly(pts, w, 0.9); pts = []; }
    }
    if(pts.length) srf.poly(pts, w, 0.9);
  }
}

/* --- IMAGE: banknote-style engraving from luminance --- */
let lumCache = { key:null, data:null };
function getLum(img, W, H){
  const key = img.src + '|' + W + 'x' + H;
  if(lumCache.key === key) return lumCache.data;
  const oc = document.createElement('canvas');
  oc.width = W; oc.height = H;
  const og = oc.getContext('2d');
  const s = Math.max(W/img.width, H/img.height);
  const dw = img.width*s, dh = img.height*s;
  og.drawImage(img, (W-dw)/2, (H-dh)/2, dw, dh);
  const d = og.getImageData(0,0,W,H).data;
  const lum = new Float32Array(W*H);
  for(let i=0;i<W*H;i++){
    lum[i] = (d[i*4]*0.2126 + d[i*4+1]*0.7152 + d[i*4+2]*0.0722) / 255;
  }
  lumCache = { key, data:lum };
  return lum;
}
function renderImage(srf, W, H, S, t){
  const lum = getLum(state.image, W, H);
  const L = (x,y) => lum[clamp(Math.round(y),0,H-1)*W + clamp(Math.round(x),0,W-1)];
  const p = state.i;
  const noise = makeNoise(state.seed);
  const [ox, oy] = driftOffsets(t);

  const spacing = lerp(13, 3.5, p.spacing) * S;
  const amp     = lerp(0.4, 7, p.amp) * S;
  const freq    = lerp(0.012, 0.07, p.freq) / S;
  const maxW    = lerp(1.2, 4.6, p.weight) * S;
  const minW    = 0.28 * S;
  const cutoff  = lerp(0.02, 0.42, p.cutoff);
  const crossT  = p.cross < 0.03 ? 2 : lerp(0.95, 0.45, p.cross);
  const px = 1.6 * S;

  function pass(angle, spMul, wMul, phaseSalt){
    const cos = Math.cos(angle), sin = Math.sin(angle);
    const diag = Math.hypot(W,H);
    const sp = spacing * spMul;
    let row = 0;
    for(let v = -diag/2; v <= diag/2; v += sp, row++){
      let penDown = false, lx=0, ly=0, lw=minW;
      const phase = noise.n2(row*0.7 + phaseSalt, phaseSalt) * TAU;
      for(let u = -diag/2; u <= diag/2; u += px){
        const wob = Math.sin(u*freq + phase + TAU*t) * amp
                  + (noise.fbm(u*0.008/S + ox*0.5, row*0.3 + phaseSalt + oy*0.5, 2) - .5) * amp;
        const vx = W/2 + u*cos - (v+wob)*sin;
        const vy = H/2 + u*sin + (v+wob)*cos;
        if(vx < -sp || vx > W+sp || vy < -sp || vy > H+sp){ penDown = false; continue; }
        const d = 1 - L(vx, vy);
        const on = wMul === 1 ? d > cutoff : d > crossT;
        const w = clamp(lerp(minW, maxW, Math.pow(Math.max(0,(d - cutoff))/(1-cutoff), 1.25)), minW, maxW) * wMul;
        if(on && penDown){
          srf.seg(lx, ly, vx, vy, (w+lw)/2, 0.92);
        }
        penDown = on; lx = vx; ly = vy; lw = w;
      }
    }
  }
  pass(0, 1, 1, 3.1);
  pass(-Math.PI/3.4, 1.35, 0.62, 9.7);
}

/* ---------- frame pipeline ---------- */
function drawFrame(c, W, H, S, t){
  if(c.width !== W) c.width = W;
  if(c.height !== H) c.height = H;
  const g = c.getContext('2d');
  g.fillStyle = state.paper;
  g.fillRect(0,0,W,H);
  const srf = canvasSurface(g);
  if(state.tab === 'texture'){
    const N = makeNoise(state.seed);
    ({flow:renderFlow, waves:renderWaves, cross:renderCross, guilloche:renderGuilloche})
      [state.mode](srf, W, H, N, S, t);
  } else if(state.image){
    renderImage(srf, W, H, S, t);
  } else {
    g.fillStyle = state.ink; g.globalAlpha = .35;
    g.font = `${13*S}px ui-monospace, monospace`;
    g.textAlign = 'center';
    g.fillText('DROP AN IMAGE TO ENGRAVE IT', W/2, H/2);
    g.globalAlpha = 1;
  }
}
function targetSize(){
  if(state.tab === 'image' && state.image){
    const img = state.image;
    const long = 1500;
    const s = long / Math.max(img.width, img.height);
    return [Math.round(img.width*s), Math.round(img.height*s)];
  }
  return RATIOS[state.ratio];
}

const cv = $('#cv');
let raf = null;
function queueRender(){
  if(motion.on) return;                 /* the motion loop repaints anyway */
  if(raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(() => {
    const [W,H] = targetSize();
    cv.style.aspectRatio = W + '/' + H;
    drawFrame(cv, W, H, 1, 0);
  });
}

/* ---------- QuickTime MOV muxer (Motion-JPEG) ----------
   Builds a real .mov container: each frame is a full-quality JPEG
   sample. Intra-frame only — imports natively into QuickTime,
   After Effects, and Premiere. */
const be32 = v => [v>>>24 & 255, v>>>16 & 255, v>>>8 & 255, v & 255];
const be16 = v => [v>>>8 & 255, v & 255];
const str4 = s => [s.charCodeAt(0), s.charCodeAt(1), s.charCodeAt(2), s.charCodeAt(3)];
function joinBytes(parts){
  let len = 0;
  for(const p of parts) len += p.length;
  const out = new Uint8Array(len);
  let o = 0;
  for(const p of parts){ out.set(p, o); o += p.length; }
  return out;
}
function atom(type, ...payloads){
  const body = joinBytes(payloads);
  return joinBytes([be32(body.length + 8), str4(type), body]);
}
const MATRIX = joinBytes([
  be32(0x10000), be32(0), be32(0),
  be32(0), be32(0x10000), be32(0),
  be32(0), be32(0), be32(0x40000000)
]);
function qtHdlr(type, subtype){
  const name = 'INTAGLIO';
  return atom('hdlr', be32(0), str4(type), str4(subtype),
              be32(0), be32(0), be32(0),
              [name.length], [...name].map(c => c.charCodeAt(0)));
}
function buildMov(jpegs, W, H, fps){
  const N = jpegs.length;
  const timescale = 600;
  const delta = Math.round(timescale / fps);
  const duration = delta * N;

  const ftyp = atom('ftyp', str4('qt  '), be32(0), str4('qt  '));
  const mdat = atom('mdat', joinBytes(jpegs));
  const firstSampleOffset = ftyp.length + 8;   /* jpeg data starts after mdat header */

  /* 86-byte 'jpeg' video sample description */
  const compName = new Uint8Array(32);
  const nm = 'Photo - JPEG';
  compName[0] = nm.length;
  for(let i=0;i<nm.length;i++) compName[1+i] = nm.charCodeAt(i);
  const sd = joinBytes([
    be32(86), str4('jpeg'),
    [0,0,0,0,0,0], be16(1),          /* reserved, data ref index */
    be16(0), be16(0),                /* version, revision */
    str4('appl'),                    /* vendor */
    be32(0), be32(512),              /* temporal / spatial quality */
    be16(W), be16(H),
    be32(0x00480000), be32(0x00480000), /* 72 dpi */
    be32(0), be16(1),                /* data size, frame count */
    compName,
    be16(24), be16(0xFFFF)           /* depth, color table id */
  ]);
  const stsd = atom('stsd', be32(0), be32(1), sd);
  const stts = atom('stts', be32(0), be32(1), be32(N), be32(delta));
  const stsc = atom('stsc', be32(0), be32(1), be32(1), be32(N), be32(1));
  const stsz = atom('stsz', be32(0), be32(0), be32(N), ...jpegs.map(j => be32(j.length)));
  const stco = atom('stco', be32(0), be32(1), be32(firstSampleOffset));
  const stbl = atom('stbl', stsd, stts, stsc, stsz, stco);

  const vmhd = atom('vmhd', be32(1), be16(0), be16(0), be16(0), be16(0));
  const dref = atom('dref', be32(0), be32(1), joinBytes([be32(12), str4('url '), be32(1)]));
  const dinf = atom('dinf', dref);
  const minf = atom('minf', vmhd, qtHdlr('dhlr','url '), dinf, stbl);
  const mdhd = atom('mdhd', be32(0), be32(0), be32(0), be32(timescale), be32(duration), be16(0x55C4), be16(0));
  const mdia = atom('mdia', mdhd, qtHdlr('mhlr','vide'), minf);

  const matrix = MATRIX;
  const tkhd = atom('tkhd', be32(7), be32(0), be32(0), be32(1), be32(0), be32(duration),
                    be32(0), be32(0), be16(0), be16(0), be16(0), be16(0),
                    matrix, be32(W << 16), be32(H << 16));
  const mvhd = atom('mvhd', be32(0), be32(0), be32(0), be32(timescale), be32(duration),
                    be32(0x00010000), be16(0x0100), new Uint8Array(10),
                    matrix, be32(0), be32(0), be32(0), be32(0), be32(0), be32(0), be32(2));
  const moov = atom('moov', mvhd, atom('trak', tkhd, mdia));

  return new Blob([ftyp, mdat, moov], { type:'video/quicktime' });
}

/* ---------- ISO MP4 muxer (H.264 via WebCodecs) ---------- */
function isoHdlr(){
  const name = [...'INTAGLIO'].map(c => c.charCodeAt(0)).concat([0]);
  return atom('hdlr', be32(0), be32(0), str4('vide'), be32(0), be32(0), be32(0), name);
}
function buildMp4(samples, description, W, H, fps){
  const N = samples.length;
  const timescale = fps * 1000, delta = 1000, duration = delta * N;

  const ftyp = atom('ftyp', str4('isom'), be32(512), str4('isom'), str4('iso2'), str4('avc1'), str4('mp41'));
  const mdat = atom('mdat', joinBytes(samples.map(s => s.data)));
  const firstSampleOffset = ftyp.length + 8;

  const avcC = atom('avcC', description);
  const entryBody = joinBytes([
    [0,0,0,0,0,0], be16(1),            /* reserved, data ref index */
    be16(0), be16(0),                  /* pre_defined, reserved */
    be32(0), be32(0), be32(0),         /* pre_defined[3] */
    be16(W), be16(H),
    be32(0x00480000), be32(0x00480000),
    be32(0), be16(1),                  /* reserved, frame count */
    new Uint8Array(32),                /* compressor name */
    be16(24), be16(0xFFFF),            /* depth, pre_defined */
    avcC
  ]);
  const avc1 = joinBytes([be32(entryBody.length + 8), str4('avc1'), entryBody]);
  const stsd = atom('stsd', be32(0), be32(1), avc1);
  const stts = atom('stts', be32(0), be32(1), be32(N), be32(delta));
  const keys = samples.map((s,i) => s.key ? i+1 : 0).filter(v => v);
  const stss = atom('stss', be32(0), be32(keys.length), ...keys.map(be32));
  const stsc = atom('stsc', be32(0), be32(1), be32(1), be32(N), be32(1));
  const stsz = atom('stsz', be32(0), be32(0), be32(N), ...samples.map(s => be32(s.data.length)));
  const stco = atom('stco', be32(0), be32(1), be32(firstSampleOffset));
  const stbl = atom('stbl', stsd, stts, stss, stsc, stsz, stco);

  const vmhd = atom('vmhd', be32(1), be16(0), be16(0), be16(0), be16(0));
  const dref = atom('dref', be32(0), be32(1), joinBytes([be32(12), str4('url '), be32(1)]));
  const minf = atom('minf', vmhd, atom('dinf', dref), stbl);
  const mdhd = atom('mdhd', be32(0), be32(0), be32(0), be32(timescale), be32(duration), be16(0x55C4), be16(0));
  const mdia = atom('mdia', mdhd, isoHdlr(), minf);
  const tkhd = atom('tkhd', be32(7), be32(0), be32(0), be32(1), be32(0), be32(duration),
                    be32(0), be32(0), be16(0), be16(0), be16(0), be16(0),
                    MATRIX, be32(W << 16), be32(H << 16));
  const mvhd = atom('mvhd', be32(0), be32(0), be32(0), be32(timescale), be32(duration),
                    be32(0x00010000), be16(0x0100), new Uint8Array(10),
                    MATRIX, be32(0), be32(0), be32(0), be32(0), be32(0), be32(0), be32(2));
  const moov = atom('moov', mvhd, atom('trak', tkhd, mdia));

  return new Blob([ftyp, mdat, moov], { type:'video/mp4' });
}

/* MP4 — seamless loop (H.264 via the browser's encoder) */
$('#exportMp4').addEventListener('click', async () => {
  if(state.tab==='image' && !state.image) return;
  if(typeof VideoEncoder === 'undefined'){
    setBusy('MP4 needs a current Chrome / Edge / Safari — MOV works everywhere');
    await sleep(3000); setBusy(''); return;
  }
  let [W,H] = targetSize();
  W &= ~1; H &= ~1;                      /* H.264 needs even dimensions */
  const fps = 30, frames = Math.round(state.dur * fps);
  const oc = document.createElement('canvas'); oc.width = W; oc.height = H;

  const samples = [];
  let description = null, encError = null;
  const enc = new VideoEncoder({
    output: (chunk, meta) => {
      if(!description && meta && meta.decoderConfig && meta.decoderConfig.description){
        description = new Uint8Array(meta.decoderConfig.description);
      }
      const b = new Uint8Array(chunk.byteLength);
      chunk.copyTo(b);
      samples.push({ data:b, key: chunk.type === 'key' });
    },
    error: e => { encError = e; }
  });

  let cfg = null;
  for(const codec of ['avc1.64002A','avc1.4D402A','avc1.42E02A']){
    const attempt = { codec, width:W, height:H, bitrate:12000000, framerate:fps,
                      avc:{ format:'avc' }, latencyMode:'realtime' };
    try{
      const s = await VideoEncoder.isConfigSupported(attempt);
      if(s.supported){ cfg = attempt; break; }
    }catch(e){}
  }
  if(!cfg){
    setBusy('This browser can\u2019t encode H.264 — use MOV instead');
    await sleep(3000); setBusy(''); return;
  }
  enc.configure(cfg);

  for(let i=0; i<frames; i++){
    drawFrame(oc, W, H, 1, i/frames);
    const vf = new VideoFrame(oc, {
      timestamp: Math.round(i * 1e6 / fps),
      duration:  Math.round(1e6 / fps)
    });
    enc.encode(vf, { keyFrame: i % (fps*2) === 0 });
    vf.close();
    setBusy(`Printing loop — frame ${i+1} / ${frames}`);
    while(enc.encodeQueueSize > 4) await sleep(4);
    await sleep(0);
  }
  await enc.flush();
  enc.close();

  if(encError || !description || !samples.length){
    setBusy('Encoding failed — use MOV instead');
    await sleep(3000); setBusy(''); return;
  }
  setBusy('Binding the reel…');
  downloadBlob(buildMp4(samples, description, W, H, fps), baseName()+'-loop.mp4');
  setBusy('');
});

/* MOV — seamless loop */
$('#exportMov').addEventListener('click', async () => {
  if(state.tab==='image' && !state.image) return;
  const [W,H] = targetSize();
  const oc = document.createElement('canvas'); oc.width = W; oc.height = H;
  const fps = 30, frames = Math.round(state.dur * fps);
  const jpegs = [];
  for(let i=0; i<frames; i++){
    drawFrame(oc, W, H, 1, i/frames);
    const blob = await new Promise(r => oc.toBlob(r, 'image/jpeg', 0.92));
    jpegs.push(new Uint8Array(await blob.arrayBuffer()));
    setBusy(`Printing loop — frame ${i+1} / ${frames}`);
    await sleep(0);

  const mov = buildMov(jpegs, W, H, fps);
  downloadBlob(mov, baseName()+'-loop.mov');
  setBusy('');
});

/* PNG frame sequence (24 fps) — for After Effects / Premiere */
$('#exportZip').addEventListener('click', async () => {
  if(state.tab==='image' && !state.image) return;
  if(typeof JSZip === 'undefined'){ setBusy('Frame export needs the JSZip library (check connection)'); await sleep(2500); setBusy(''); return; }
  const [W,H] = targetSize();
  const oc = document.createElement('canvas');
  const zip = new JSZip();
  const folder = zip.folder(baseName()+'-frames');
  const fps = 24, frames = Math.round(state.dur * fps);
  for(let i=0; i<frames; i++){
    drawFrame(oc, W, H, 1, i/frames);
    const blob = await new Promise(r => oc.toBlob(r, 'image/png'));
    folder.file(`frame_${String(i).padStart(4,'0')}.png`, blob);
    setBusy(`Etching frame ${i+1} / ${frames}`);
    await sleep(0);
  }
  setBusy('Packing frames…');
  const out = await zip.generateAsync({type:'blob'});
  downloadBlob(out, baseName()+'-frames.zip');
  setBusy('');
});

queueRender();
</script>
</body>
</html>
